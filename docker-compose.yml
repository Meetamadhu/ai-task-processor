version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: ai-task-processor-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-task-processor

  redis:
    image: redis:7-alpine
    container_name: ai-task-processor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-task-processor-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/ai-task-processor
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-me}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_URI: mongodb://mongo:27017/ai-task-processor
    depends_on:
      - mongo
      - redis
    volumes:
      - ./worker:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: ai-task-processor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data: