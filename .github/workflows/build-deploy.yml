name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and lint frontend
        run: cd frontend && npm ci && npm run lint

      - name: Install and lint backend
        run: cd backend && npm ci && npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint worker
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 worker/worker.py

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            path: ./frontend
            dockerfile: Dockerfile
          - name: backend
            path: ./backend
            dockerfile: Dockerfile
          - name: worker
            path: ./worker
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Hub secrets
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USER" ] || [ -z "$DOCKER_PASS" ]; then
            echo "::error::Missing GitHub Actions secrets. Add DOCKER_USERNAME and DOCKER_PASSWORD under Settings → Secrets and variables → Actions. Use a Docker Hub access token as DOCKER_PASSWORD if login fails."
            exit 1
          fi

      - name: Set frontend build API URL
        id: fe_api
        env:
          VAR_URL: ${{ vars.REACT_APP_API_URL }}
          SECRET_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          FE_URL="$VAR_URL"
          if [ -z "$FE_URL" ]; then FE_URL="$SECRET_URL"; fi
          if [ -z "$FE_URL" ]; then FE_URL="http://localhost:5000/api"; fi
          echo "react_app_api_url=$FE_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (backend, worker)
        if: matrix.service.name != 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:buildcache,mode=max

      - name: Build and push Docker image (frontend)
        if: matrix.service.name == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/${{ matrix.service.dockerfile }}
          push: true
          build-args: |
            REACT_APP_API_URL=${{ steps.fe_api.outputs.react_app_api_url }}
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/ai-task-processor-${{ matrix.service.name }}:buildcache,mode=max

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verify infra secrets (must be on this repo, not infra-repo)
        env:
          INFRA_REPO: ${{ secrets.INFRA_REPO }}
          INFRA_DEPLOY_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
        run: |
          if [ -z "$INFRA_REPO" ] || [ -z "$INFRA_DEPLOY_TOKEN" ]; then
            echo "::error::INFRA_REPO and/or INFRA_DEPLOY_TOKEN are empty in this workflow. Add both under Settings → Secrets and variables → Actions on **this** repository (${{ github.repository }}). If they are organization secrets, open the secret and allow access to this repository. Re-run the job after saving."
            exit 1
          fi

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infra
          persist-credentials: true

      - name: Bump Kustomize image registry and tag
        working-directory: infra
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re
          path = "k8s/kustomization.yaml"
          with open(path, encoding="utf-8") as f:
              text = f.read()
          user = os.environ["DOCKER_USERNAME"].strip()
          sha = os.environ["GIT_SHA"].strip()
          text = re.sub(r"docker\.io/your-username", f"docker.io/{user}", text)
          text = re.sub(r"(?m)^    newTag:.*$", f"    newTag: {sha}", text)
          with open(path, "w", encoding="utf-8") as f:
              f.write(text)
          PY

      - name: Commit and push manifest changes
        working-directory: infra
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: bump container image tag to ${GIT_SHA}"
          git push origin HEAD:main
